<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1440" role="img" aria-labelledby="title desc">
  <title id="title">미니멀 웨딩 청첩장 커버</title>
  <desc id="desc">밝은 종이 질감과 얇은 식물 라인이 있는 세로형 웨딩 커버 이미지</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf5"/>
      <stop offset=".58" stop-color="#f2eee5"/>
      <stop offset="1" stop-color="#fffefa"/>
    </linearGradient>
    <radialGradient id="wash" cx=".52" cy=".36" r=".72">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset=".64" stop-color="#d9d2c5" stop-opacity=".2"/>
      <stop offset="1" stop-color="#d9d2c5" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .035"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="960" height="1440" fill="url(#paper)"/>
  <rect width="960" height="1440" fill="url(#wash)"/>
  <rect width="960" height="1440" filter="url(#grain)" opacity=".42"/>
  <g fill="none" stroke="#6f7d68" stroke-linecap="round" stroke-linejoin="round" opacity=".5">
